<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FloatCanvas Prototype</title>
<style>
  body { margin: 0; overflow: hidden; background: #222; }
  #controls {
    position: fixed; top: 10px; left: 10px;
    background: rgba(255,255,255,0.8); padding: 10px; border-radius: 8px;
  }
</style>
</head>
<body>

<div id="controls">
  <input type="file" id="upload" accept="image/*">
  <button id="add">Add Floating Image</button>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let uploadedImage = null;
let floaters = [];

document.getElementById("upload").addEventListener("change", e => {
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = () => {
    uploadedImage = new Image();
    uploadedImage.src = reader.result;
  };
  reader.readAsDataURL(file);
});

document.getElementById("add").addEventListener("click", () => {
  if (!uploadedImage) return alert("Upload an image first!");

  floaters.push({
    img: uploadedImage,
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    dx: (Math.random() - 0.5) * 4,
    dy: (Math.random() - 0.5) * 4,
    size: 100
  });
});

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  floaters.forEach(f => {
    f.x += f.dx;
    f.y += f.dy;

    if (f.x < 0 || f.x + f.size > canvas.width) f.dx *= -1;
    if (f.y < 0 || f.y + f.size > canvas.height) f.dy *= -1;

    ctx.drawImage(f.img, f.x, f.y, f.size, f.size);
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
